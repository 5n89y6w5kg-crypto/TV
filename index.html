            padding: 20px;
            padding-top: 60px;
            position: relative;
            overflow: hidden;
        }
        .live-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(233, 69, 96, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 15px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .hero-subtitle { color: #a0a0a0; font-size: 15px; margin-bottom: 20px; }
        .watch-btn {

            align-items: center;
            background: #4a69ff;
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .watch-btn i { margin-right: 8px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #1a1a2e;
            margin: -20px 15px 20px;
            padding: 18px 10px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 20px; font-weight: 800; color: #4a69ff; display: block; }
        .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
        .search-container {
            padding: 0 15px 15px;
            position: sticky;
            top: 0;
            background: #0f0f1e;
            z-index: 10;
        }
        .search-box {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box input {
            background: none;
            border: none;
            color: white;
            flex: 1;
            font-size: 15px;
            outline: none;
        }
        .section { padding: 0 15px 20px; }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

            background: linear-gradient(135deg, var(--color) 0%, #1a1a2e 100%);

            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .category-icon { font-size: 32px; margin-bottom: 10px; }
        .category-name { font-weight: 600; font-size: 15px; }
        .category-count { font-size: 12px; color: #a0a0a0; margin-top: 4px; }
        .channels-list { display: flex; flex-direction: column; gap: 10px; }
        .channel-item {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }
        .channel-item:active { transform: scale(0.98); background: #252542; }
        .channel-item.active { border-color: #4a69ff; background: #1e1e3f; }
        .channel-item.error { opacity: 0.6; }
        .channel-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #533483, #e94560);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;

            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            color: #888;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

            background: #4a69ff;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;

            height: 40px;

            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;

        .player-header {

            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);

        .player-title { font-size: 16px; font-weight: 600; }
        .close-btn {

            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        .video-js { width: 100%; height: 100%; max-height: 100vh; }
        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1a1a2e;
            border-top-color: #4a69ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;

            border: 1px solid #e94560;
            color: #e94560;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;

            left: 0;
            right: 0;

            { id: 147, name: "Scandalous", category: "18+", logo: " scandal", url: "https://scandalous-scandalous-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: true, country: "USA", age18: true },
            { id: 148, name: "Shocking", category: "18+", logo: "⚡", url: "https://shocking-shocking-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: true, country: "USA", age18: true },

            { id: 150, name: "Provocative", category: "18+", logo: "🔥", url: "https://provocative-provocative-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: true, country: "USA", age18: true },
            { id: 151, name: "Explicit", category: "18+", logo: "📢", url: "https://explicit-explicit-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: true, country: "USA", age18: true },
            { id: 152, name: "Mature Content", category: "18+", logo: "🔞", url: "https://maturecontent-maturecontent-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: false, country: "USA", age18: true },
            { id: 153, name: "Adult Swim", category: "18+", logo: "🏊", url: "https://adultswim-adultswim-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: true, country: "USA", age18: true },
            { id: 154, name: "Late Night", category: "18+", logo: "🌙", url: "https://latenight-latenight-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: true, country: "USA", age18: true },
            { id: 155, name: "After Dark", category: "18+", logo: "🌃", url: "https://afterdark-afterdark-1-eu.rakuten.wurl.tv/playlist.m3u8", hd: false, country: "USA", age18: true }
        ];

        const categories = [
            { id: 'news', name: 'Новости', icon: '📰', color: '#e94560', count: 20 },
            { id: 'sport', name: 'Спорт', icon: '⚽', color: '#0f3460', count: 15 },
            { id: 'movies', name: 'Кино', icon: '🎬', color: '#533483', count: 20 },
            { id: 'ent', name: 'Развлечения', icon: '🌟', color: '#16213e', count: 15 },
            { id: 'music', name: 'Музыка', icon: '🎵', color: '#0f3460', count: 15 },
            { id: 'kids', name: 'Детские', icon: '👶', color: '#e94560', count: 10 },
            { id: 'docs', name: 'Документальные', icon: '📚', color: '#533483', count: 10 },
            { id: '18+', name: '18+', icon: '🔞', color: '#c70039', count: 50 }
        ];

        let favorites = JSON.parse(localStorage.getItem('tvFavorites') || '[]');
        let ageVerified = localStorage.getItem('ageVerified') === 'true';
        let currentCategory = 'all';
        let player = null;
        let hls = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            renderChannels();
            checkAgeVerification();
        });

        function checkAgeVerification() {
            if (!ageVerified) {
                const modal = document.createElement('div');
                modal.className = 'warning-modal';
                modal.innerHTML = `
                    <div class="warning-content">
                        <h2>⚠️ 18+ Контент</h2>
                        <p>Это приложение содержит контент для взрослых. Вам уже есть 18 лет?</p>
                        <button class="warning-btn" onclick="verifyAge(true)">Да, мне есть 18</button>
                        <button class="warning-btn secondary" onclick="verifyAge(false)">Нет</button>
                    </div>
                `;
                document.body.appendChild(modal);
            }
        }

        function verifyAge(isAdult) {
            if (isAdult) {
                ageVerified = true;
                localStorage.setItem('ageVerified', 'true');
            } else {
                alert('Извините, доступ только для лиц старше 18 лет');
                window.close();
            }
            document.querySelector('.warning-modal').remove();
        }

        function renderCategories() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = categories.map(cat => `
                <div class="category-card" 
                     style="--color: ${cat.color}"
                     onclick="filterByCategory('${cat.id}')">
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">${cat.name}</div>
                    <div class="category-count">${cat.count} каналов</div>
                </div>
            `).join('');
        }

        function renderChannels(channels = channelsData) {
            const list = document.getElementById('channelsList');
            const count = document.getElementById('channelsCount');
            const title = document.getElementById('currentCategoryTitle');
            
            count.textContent = `${channels.length} каналов`;
            
            if (channels.length === 0) {
                list.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle" style="font-size: 40px; margin-bottom: 10px;"></i>
                        <p>Каналы не найдены</p>
                    </div>
                `;
                return;
            }
            
            // Check if showing 18+ content
            const is18Plus = currentCategory === '18+' || channels.some(ch => ch.age18);
            if (is18Plus && !ageVerified) {
                list.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-lock" style="font-size: 40px; margin-bottom: 10px;"></i>
                        <p>Для просмотра 18+ контента подтвердите возраст</p>
                        <button class="watch-btn" style="margin-top: 15px;" onclick="checkAgeVerification()">
                            Подтвердить возраст
                        </button>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = channels.map(channel => `
                <div class="channel-item" 
                     id="channel-${channel.id}"
                     onclick="playChannel(${channel.id})">
                    <div class="channel-logo">${channel.logo}</div>
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-meta">
                            ${channel.hd ? '<span class="hd-badge">HD</span>' : ''}
                            ${channel.age18 ? '<span class="age-badge">18+</span>' : ''}
                            <span class="live-indicator"><i class="fas fa-circle" style="font-size: 6px;"></i> LIVE</span>
                            <span>${channel.country}</span>
                        </div>
                    </div>
                    <div class="channel-play">
                        <i class="fas fa-play" style="color: white; margin-left: 3px;"></i>
                    </div>
                    <div class="fav-btn ${favorites.includes(channel.id) ? 'active' : ''}" 
                         onclick="event.stopPropagation(); toggleFavorite(${channel.id})">
                        <i class="fas fa-heart"></i>
                    </div>
                </div>
            `).join('');
        }

        function filterByCategory(categoryId) {
            currentCategory = categoryId;
            const filtered = categoryId === 'all' 
                ? channelsData 
                : channelsData.filter(ch => ch.category === categoryId);
            
            const catName = categoryId === 'all' ? 'Все каналы' : categories.find(c => c.id === categoryId)?.name;
            document.getElementById('currentCategoryTitle').textContent = catName;
            
            renderChannels(filtered);
            document.getElementById('channelsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function searchChannels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = channelsData.filter(ch => 
                ch.name.toLowerCase().includes(query) ||
                ch.category.toLowerCase().includes(query)
            );
            renderChannels(filtered);
        }

        async function playChannel(channelId) {
            const channel = channelsData.find(ch => ch.id === channelId);
            if (!channel) return;

            if (channel.age18 && !ageVerified) {
                alert('Требуется подтверждение возраста 18+');
                checkAgeVerification();
                return;
            }

            const modal = document.getElementById('playerModal');
            const title = document.getElementById('playerTitle');
            const loading = document.getElementById('loadingOverlay');
            
            title.textContent = channel.name;
            modal.classList.add('active');
            loading.style.display = 'block';
            
            const video = document.getElementById('videoPlayer');
            
            // Destroy previous HLS instance
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            // Reset video
            video.pause();
            video.src = '';
            video.load();
            
            // Try to play with timeout
            const playPromise = new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    reject(new Error('Timeout: канал не отвечает'));
                }, 15000);
                
                video.onloadeddata = () => {
                    clearTimeout(timeout);
                    resolve();
                };
                
                video.onerror = (e) => {
                    clearTimeout(timeout);
                    reject(new Error('Ошибка загрузки потока'));
                };
            });
            
            try {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        debug: false,
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 90
                    });
                    
                    hls.loadSource(channel.url);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(e => console.warn('Autoplay prevented:', e));
                        loading.style.display = 'none';
                        document.getElementById(`channel-${channelId}`)?.classList.add('active');
                    });
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            loading.innerHTML = `
                                <div style="color: #e94560; text-align: center;">
                                    <i class="fas fa-exclamation-triangle" style="font-size: 40px; margin-bottom: 10px;"></i>
                                    <p>Канал недоступен</p>
                                    <p style="font-size: 12px; color: #888;">Попробуйте другой канал</p>
                                </div>
                            `;
                            document.getElementById(`channel-${channelId}`)?.classList.add('error');
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = channel.url;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(e => console.warn('Autoplay prevented:', e));
                        loading.style.display = 'none';
                    });
                }
                
                await playPromise;
                
            } catch (error) {
                console.error('Playback error:', error);
                loading.innerHTML = `
                    <div style="color: #e94560; text-align: center; padding: 20px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 40px; margin-bottom: 10px;"></i>
                        <p>Не удалось загрузить канал</p>
                        <p style="font-size: 12px; color: #888; margin-top: 10px;">${error.message}</p>
                        <button class="watch-btn" style="margin-top: 15px;" onclick="closePlayer()">
                            Закрыть
                        </button>
                    </div>
                `;
                document.getElementById(`channel-${channelId}`)?.classList.add('error');
            }
        }

        function closePlayer() {
            const modal = document.getElementById('playerModal');
            const loading = document.getElementById('loadingOverlay');
            const video = document.getElementById('videoPlayer');
            
            modal.classList.remove('active');
            loading.style.display = 'block';
            loading.innerHTML = '<div class="spinner"></div><p>Загрузка потока...</p>';
            
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            if (video) {
                video.pause();
                video.src = '';
                video.load();
            }
            
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        function toggleFavorite(channelId) {
            const index = favorites.indexOf(channelId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(channelId);
            }
            localStorage.setItem('tvFavorites', JSON.stringify(favorites));
            renderChannels(currentCategory === 'all' ? channelsData : channelsData.filter(ch => ch.category === currentCategory));
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tab === 'favorites') {
                const favChannels = channelsData.filter(ch => favorites.includes(ch.id));
                renderChannels(favChannels);
                document.getElementById('currentCategoryTitle').textContent = 'Избранное';
                document.getElementById('channelsSection').scrollIntoView({ behavior: 'smooth' });
            } else if (tab === 'home') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (tab === 'search') {
                document.getElementById('searchInput').focus();
            } else if (tab === 'channels') {
                filterByCategory('all');
            }
        }

        function scrollToChannels() {
            document.getElementById('channelsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function showAllCategories() {
            filterByCategory('all');
        }

        // Prevent zoom
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());
    </script>
</body>
